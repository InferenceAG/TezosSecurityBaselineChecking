name: Lint

on:
  push:
    paths:
      - '**/*.sh'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - '**/*.sh'

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck on framework scripts
        run: |
          find _framework -name "*.sh" -exec shellcheck --severity=warning {} +

      - name: Run shellcheck on test scripts
        # Use info severity for test scripts — they follow a legacy pattern
        run: |
          find testcases -name "execute_test.sh" \
            -not -path "*/old/*" \
            -exec shellcheck --severity=warning {} +
